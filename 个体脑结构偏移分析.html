<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个体脑结构偏移分析</title>
    <style>
        :root {
            --bg-color: #050a18;
            --panel-bg: rgba(255, 255, 255, 0.05);
            --accent-color: #00e5ff;
            --danger-color: #ff4d4d; /* 用于 S001 等标签的红色 */
            --text-primary: #ffffff;
            --border-color: rgba(0, 191, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 40px;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 顶部面包屑/导航 */
        .nav-header {
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            color: var(--accent-color);
            text-decoration: none;
            border: 1px solid var(--accent-color);
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: rgba(0, 229, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }

        /* 标题组 */
        .title-group h1 {
            font-size: 18px;
            color: #aaa;
            margin: 0 0 10px 0;
            font-weight: normal;
        }

        .title-group h2 {
            font-size: 32px;
            margin: 0;
            color: var(--accent-color);
            letter-spacing: 1px;
        }

        /* 脑部图像网格布局 */
        .brain-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-top: 50px;
        }

        .brain-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 模拟脑部图像容器 */
        .image-viewer {
            width: 100%;
            height: 520px;
            aspect-ratio: auto;
            /* background: #000; */
            border: 1px solid var(--border-color);
            border-radius: 8px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0, 229, 255, 0.1);
        }

        /* 模拟扫描辅助线 */
        .image-viewer::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 1px;
            background: rgba(0, 229, 255, 0.1);
        }
        .image-viewer::after {
            content: "";
            position: absolute;
            height: 100%;
            width: 1px;
            background: rgba(0, 229, 255, 0.1);
        }

        .brain-placeholder {
            width: 100%;
            /* opacity: 0.6;
            filter: hue-rotate(180deg) brightness(1.2); */
        }

        /* 底部红色标签 */
        .label-red {
            margin-top: 20px;
            color: var(--danger-color);
            font-size: 20px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 2px;
        }

        /* 辅助说明文字 */
        .analysis-note {
            margin-top: 60px;
            padding: 20px;
            border-top: 1px solid var(--border-color);
            color: #888;
            font-size: 14px;
            line-height: 1.8;
        }
    </style>
    <link rel="stylesheet" href="style.css">
    <style>
        .brain-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 30px;
            margin-top: 50px;
        }

        .brain-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            min-width: 0;
        }

        .image-viewer::before,
        .image-viewer::after {
            content: none;
        }

        .brain-placeholder {
            width: 112%;
            height: 112%;
            object-fit: cover;
            display: block;
        }

        .brain-svg-object,
        .brain-svg-inline {
            width: 138%;
            height: 138%;
            display: block;
            border: 0;
            pointer-events: auto;
        }

        .brain-svg-inline svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .brain-svg-inline path:focus,
        .brain-svg-inline path:focus-visible {
            outline: none;
        }

        .scan-line-horizontal {
            position: absolute;
            left: 18px;
            top: 16px;
            z-index: 3;
            color: white;
            font-family: "Courier New", Courier, monospace;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
            pointer-events: none;
        }

        .brain-svg-tooltip {
            position: fixed;
            z-index: 10000;
            min-width: 178px;
            padding: 10px 12px;
            border: 1px solid rgba(0, 229, 255, 0.46);
            border-radius: 6px;
            background: rgba(5, 14, 28, 0.94);
            color: #d9fbff;
            font-size: 12px;
            line-height: 1.65;
            opacity: 0;
            pointer-events: none;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.38);
            transform: translate(14px, 14px);
            transition: opacity 0.15s ease;
        }

        .brain-svg-tooltip.is-visible {
            opacity: 1;
        }

        .brain-svg-tooltip strong {
            display: block;
            margin-bottom: 2px;
            color: #ffffff;
            font-size: 13px;
        }

        .brain-svg-tooltip span {
            color: var(--accent-color);
        }

        .brain-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            padding: 32px;
            background: rgba(0, 0, 0, 0.86);
            cursor: zoom-out;
        }

        .brain-modal.is-open {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brain-modal-panel {
            width: min(1180px, 94vw);
            max-height: 88vh;
            padding: 24px;
            overflow: auto;
            border: 1px solid rgba(0, 229, 255, 0.32);
            border-radius: 8px;
            background: rgba(8, 18, 34, 0.96);
            cursor: default;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        }

        .brain-modal-title {
            margin: 0 0 18px;
            color: var(--accent-color);
            font-size: 18px;
            font-weight: 700;
        }

        .brain-modal-meta {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            margin: -6px 0 18px;
            color: #d6f8ff;
            font-size: 13px;
        }

        .brain-modal-meta div {
            min-width: 0;
            padding: 9px 10px;
            border: 1px solid rgba(0, 229, 255, 0.18);
            border-radius: 6px;
            background: rgba(0, 229, 255, 0.06);
        }

        .brain-modal-meta span {
            color: var(--accent-color);
        }

        .stage-curve-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 18px;
        }

        .stage-curve-card {
            min-width: 0;
        }

        .stage-curve-label {
            margin: 0 0 10px;
            color: var(--danger-color);
            font-family: "Courier New", Courier, monospace;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            text-align: center;
        }

        .stage-curve-card img {
            width: 100%;
            display: block;
            object-fit: contain;
            background: #fff;
            border-radius: 6px;
        }

        .label-red {
            width: min(100%, 1160px);
            margin-top: 0;
            margin-bottom: 14px;
            padding: 0;
            background: transparent;
            border: 0;
            border-radius: 0;
            color: var(--danger-color);
            font-family: "Courier New", Courier, monospace;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        @media (max-width: 980px) {
            .brain-grid {
                grid-template-columns: 1fr;
            }

            .image-viewer {
                width: 100%;
                margin: 0 auto;
            }

            .stage-curve-grid {
                grid-template-columns: 1fr;
            }

            .brain-modal-meta {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 620px) {
            .image-viewer {
                width: 100%;
            }

            .brain-modal-meta {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <script>
        const brainModal = document.getElementById('brainModal');
        const brainModalTitle = document.getElementById('brainModalTitle');
        const brainModalPanel = document.querySelector('.brain-modal-panel');
        const brainSvgInline = document.getElementById('brainSvgInline');
        const brainTooltip = document.createElement('div');

        brainTooltip.className = 'brain-svg-tooltip';
        brainTooltip.setAttribute('role', 'tooltip');
        document.body.appendChild(brainTooltip);

        const brainRegionNames = [
            'L_bankssts', 'L_caudalanteriorcingulate', 'L_caudalmiddlefrontal', 'L_cuneus', 'L_entorhinal', 'L_frontalpole', 'L_fusiform', 'L_inferiorparietal',
            'L_inferiortemporal', 'L_insula', 'L_isthmuscingulate', 'L_lateraloccipital', 'L_lateralorbitofrontal', 'L_lingual', 'L_medialorbitofrontal',
            'L_middletemporal', 'L_paracentral', 'L_parahippocampal', 'L_parsopercularis', 'L_parsorbitalis', 'L_parstriangularis', 'L_pericalcarine',
            'L_postcentral', 'L_posteriorcingulate', 'L_precentral', 'L_precuneus', 'L_rostralanteriorcingulate', 'L_rostralmiddlefrontal', 'L_superiorfrontal',
            'L_superiorparietal', 'L_superiortemporal', 'L_supramarginal', 'L_temporalpole', 'L_transversetemporal',
            'R_bankssts', 'R_caudalanteriorcingulate', 'R_caudalmiddlefrontal', 'R_cuneus', 'R_entorhinal', 'R_frontalpole', 'R_fusiform', 'R_inferiorparietal',
            'R_inferiortemporal', 'R_insula', 'R_isthmuscingulate', 'R_lateraloccipital', 'R_lateralorbitofrontal', 'R_lingual', 'R_medialorbitofrontal',
            'R_middletemporal', 'R_paracentral', 'R_parahippocampal', 'R_parsopercularis', 'R_parsorbitalis', 'R_parstriangularis', 'R_pericalcarine',
            'R_postcentral', 'R_posteriorcingulate', 'R_precentral', 'R_precuneus', 'R_rostralanteriorcingulate', 'R_rostralmiddlefrontal', 'R_superiorfrontal',
            'R_superiorparietal', 'R_superiortemporal', 'R_supramarginal', 'R_temporalpole', 'R_transversetemporal'
        ];

        function createRegionData(index, path) {
            const seed = index + 1;
            const deviation = ((Math.sin(seed * 1.37) * 1.8) + (seed % 5 - 2) * 0.42).toFixed(2);
            const volume = (820 + (seed * 37) % 520 + Math.abs(Math.sin(seed)) * 90).toFixed(1);
            const zScore = (Number(deviation) / 1.18).toFixed(2);

            return {
                id: String(seed).padStart(2, '0'),
                name: brainRegionNames[index] || `脑区 ${String(seed).padStart(2, '0')}`,
                nativeCode: path.getAttribute('id') || path.getAttribute('class') || `svg-path-${seed}`,
                deviation,
                volume,
                zScore,
                trend: Number(deviation) >= 0 ? '偏高' : '偏低'
            };
        }

        function isBrainRegionPath(path) {
            const d = path.getAttribute('d') || '';
            const style = path.getAttribute('style') || '';
            const fill = path.style.fill || path.getAttribute('fill') || '';
            let box;

            if (!d || d.length < 80) return false;
            if (fill === 'none' || fill === '#FFFFFF' || fill === '#ffffff') return false;
            if (style.includes('fill: none') || style.includes('fill: #FFFFFF') || style.includes('fill:#FFFFFF')) return false;
            try {
                box = path.getBBox();
            } catch (error) {
                return false;
            }
            if (box.width < 2 || box.height < 2) return false;
            if (box.x > 925 || box.y < 170 || box.y > 325) return false;

            return true;
        }

        function getRegionTip(region) {
            return `
                <strong>${region.name}</strong>
                <div>编号：<span>${region.id}</span></div>
            `;
        }

        function showTooltip(region, event) {
            brainTooltip.innerHTML = getRegionTip(region);
            brainTooltip.style.left = `${event.clientX}px`;
            brainTooltip.style.top = `${event.clientY}px`;
            brainTooltip.classList.add('is-visible');
        }

        function hideTooltip() {
            brainTooltip.classList.remove('is-visible');
        }

        function openRegionModal(region) {
            brainModalTitle.textContent = `${region.name} 三阶段曲线图`;
            brainModal.classList.add('is-open');
            brainModal.setAttribute('aria-hidden', 'false');
        }

        function initializeSvgRegions() {
            const svgElement = brainSvgInline.querySelector('svg');
            if (!svgElement) return;
            if (svgElement.dataset.regionsReady === 'true') return;
            svgElement.dataset.regionsReady = 'true';

            const regionPaths = Array.from(svgElement.querySelectorAll('path'))
                .filter(isBrainRegionPath);

            regionPaths.forEach((path, index) => {
                const region = createRegionData(index % brainRegionNames.length, path);
                path.dataset.regionId = region.id;
                path.dataset.regionName = region.name;
                path.regionData = region;
                path.setAttribute('tabindex', '0');
                path.setAttribute('role', 'button');
                path.setAttribute('aria-label', `${region.name}，偏移率${region.deviation}%，点击查看三阶段曲线图`);
                path.style.cursor = 'pointer';
                path.style.pointerEvents = 'visiblePainted';
                path.style.transition = 'opacity 0.15s ease, filter 0.15s ease, stroke-width 0.15s ease';
            });

            svgElement.addEventListener('mousemove', (event) => {
                const path = event.target.closest('path[data-region-id]');
                if (!path || !svgElement.contains(path)) return;
                showTooltip(path.regionData, event);
            });

            svgElement.addEventListener('mouseover', (event) => {
                const path = event.target.closest('path[data-region-id]');
                if (!path || !svgElement.contains(path)) return;
                path.dataset.originalStroke = path.style.stroke || path.getAttribute('stroke') || '';
                path.dataset.originalStrokeWidth = path.style.strokeWidth || path.getAttribute('stroke-width') || '';
                path.style.opacity = '0.88';
                path.style.filter = 'drop-shadow(0px 0px 5px rgba(255, 77, 77, 0.72))';
                path.style.stroke = '#ffffff';
                path.style.strokeWidth = '1.35';
            });

            svgElement.addEventListener('mouseout', (event) => {
                const path = event.target.closest('path[data-region-id]');
                if (!path || !svgElement.contains(path)) return;
                path.style.opacity = '';
                path.style.filter = '';
                path.style.stroke = path.dataset.originalStroke;
                path.style.strokeWidth = path.dataset.originalStrokeWidth;
                hideTooltip();
            });

            svgElement.addEventListener('click', (event) => {
                const path = event.target.closest('path[data-region-id]');
                if (!path || !svgElement.contains(path)) return;
                openRegionModal(path.regionData);
            });

            svgElement.addEventListener('keydown', (event) => {
                if (event.key !== 'Enter' && event.key !== ' ') return;
                const path = event.target.closest('path[data-region-id]');
                if (!path) return;
                event.preventDefault();
                openRegionModal(path.regionData);
            });
        }

        initializeSvgRegions();

        brainModalPanel.addEventListener('click', (event) => {
            event.stopPropagation();
        });

        brainModal.addEventListener('click', () => {
            brainModal.classList.remove('is-open');
            brainModal.setAttribute('aria-hidden', 'true');
        });
    </script>

</body>
</html>
