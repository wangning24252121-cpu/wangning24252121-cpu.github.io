<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音关键特征分析 - 全周期信息</title>
    <style>
        :root {
            --bg-color: #050a18;
            --panel-bg: rgba(20, 26, 35, 0.7);
            --accent-color: #00e5ff;
            --bar-color: rgba(0, 229, 255, 0.6);
            --text-primary: #ffffff;
            --text-secondary: #a0c4ff;
            --border-color: rgba(0, 191, 255, 0.2);
            --danger-text: #ff4d4d;
        }

        body {
            margin: 0;
            padding: 30px;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 顶部标题区域 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .title-left h1 {
            font-size: 24px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .title-left span {
            font-size: 16px;
            color: var(--text-secondary);
            font-weight: normal;
        }

        .title-right {
            color: var(--danger-text);
            font-size: 14px;
            border: 1px solid var(--danger-text);
            padding: 4px 12px;
            border-radius: 4px;
        }

        /* 章节样式 */
        .section {
            margin-bottom: 50px;
        }

        .section-title {
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--accent-color);
            border-left: 4px solid var(--accent-color);
            padding-left: 15px;
        }

        /* 图表网格布局 */
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .chart-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 柱状图容器 */
        .chart-container {
            width: 100%;
            height: 180px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding: 20px 15px 10px 15px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        /* 模拟10条数据的柱子 */
        .bar {
            width: 6%;
            background: linear-gradient(to top, var(--accent-color), #0080ff);
            border-radius: 2px 2px 0 0;
            transition: height 0.5s ease;
            position: relative;
        }

        .bar:hover {
            filter: brightness(1.3);
            box-shadow: 0 0 10px var(--accent-color);
        }

        /* 日期标签 */
        .date-label {
            margin-top: 15px;
            font-size: 14px;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.05);
            padding: 4px 20px;
            border-radius: 20px;
        }

        /* 返回按钮 */
        .back-nav {
            margin-bottom: 20px;
        }
        .back-nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
        }
        .back-nav a:hover { color: var(--accent-color); }

        .voice-page .module-header,
        .voice-feature-section {
            width: min(1440px, 100%);
            margin-left: auto;
            margin-right: auto;
        }

        .voice-feature-section {
            margin-top: 28px;
            padding: 26px 30px 30px;
            background: rgba(11, 24, 39, 0.58);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(16px);
        }

        .voice-section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 0 26px;
            color: var(--text-primary);
            font-size: 18px;
            font-weight: 700;
        }

        .voice-section-title::before {
            content: "";
            width: 20px;
            height: 20px;
            border: 1.5px solid var(--text-secondary);
            border-radius: 50%;
            background:
                radial-gradient(circle at 35% 35%, var(--text-secondary) 0 2px, transparent 2px),
                radial-gradient(circle at 65% 35%, var(--text-secondary) 0 2px, transparent 2px),
                radial-gradient(circle at 50% 65%, var(--text-secondary) 0 2px, transparent 2px);
        }

        .voice-chart-scroll {
            max-height: 590px;
            overflow: auto;
            padding: 0 14px 18px 0;
            scrollbar-color: rgba(148, 194, 230, 0.45) rgba(255, 255, 255, 0.06);
        }

        .voice-chart-scroll::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        .voice-chart-scroll::-webkit-scrollbar-thumb {
            background: rgba(148, 194, 230, 0.45);
            border-radius: 999px;
        }

        .voice-chart-panel {
            min-width: 980px;
            padding: 22px 26px 24px;
            background: rgba(17, 31, 51, 0.78);
            border: 1px solid rgba(148, 194, 230, 0.2);
            border-radius: 8px;
        }

        .voice-chart-panel + .voice-chart-panel {
            margin-top: 28px;
        }

        .voice-sample-title {
            margin: 0 0 22px;
            color: var(--text-primary);
            font-size: 26px;
            font-weight: 500;
        }

        .voice-bar-chart {
            width: 100%;
            height: 280px;
            display: block;
        }

        .voice-axis {
            stroke: rgba(148, 194, 230, 0.28);
            stroke-width: 1;
        }

        .voice-grid {
            stroke: rgba(148, 194, 230, 0.1);
            stroke-width: 1;
        }

        .voice-axis-label {
            fill: var(--text-secondary);
            font-size: 12px;
        }

        .voice-feature-label {
            fill: var(--text-secondary);
            font-size: 12px;
        }

        .voice-bar-primary {
            fill: rgba(56, 189, 248, 0.86);
        }

        .voice-bar-secondary {
            fill: rgba(45, 212, 191, 0.76);
        }

        .voice-bar-warn {
            fill: rgba(251, 191, 36, 0.78);
        }

        .voice-insight-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        .voice-insight-panel {
            min-width: 0;
            padding: 22px 26px 24px;
            background: rgba(17, 31, 51, 0.78);
            border: 1px solid rgba(148, 194, 230, 0.2);
            border-radius: 8px;
        }

        .voice-panel-title {
            margin: 0 0 18px;
            color: var(--text-primary);
            font-size: 22px;
            font-weight: 600;
        }

        .voice-spectrum,
        .voice-spectrum-img,
        .voice-word-cloud {
            width: 100%;
            display: block;
        }

        .voice-split-frame {
            position: relative;
            overflow: hidden;
            border-radius: 6px;
        }

        .voice-stage-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 18px;
        }

        .voice-stage-card {
            min-width: 0;
        }

        .voice-stage-title {
            margin: 0 0 10px;
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 600;
            text-align: center;
        }

        .voice-spectrum-img {
            height: auto;
            object-fit: contain;
            background: #eef4f4;
        }

        .voice-word-cloud {
            aspect-ratio: 640 / 530;
            height: auto;
        }

        .spectrum-bg {
            fill: rgba(255, 255, 255, 0.025);
        }

        .spectrum-grid {
            stroke: rgba(148, 194, 230, 0.12);
            stroke-width: 1;
        }

        .spectrum-axis {
            stroke: rgba(148, 194, 230, 0.32);
            stroke-width: 1.2;
        }

        .spectrum-area {
            fill: url(#spectrumGradient);
            opacity: 0.72;
        }

        .spectrum-line {
            fill: none;
            stroke: var(--accent-strong);
            stroke-width: 2.4;
        }

        .spectrum-peak {
            fill: rgba(251, 191, 36, 0.92);
            filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.45));
        }

        .voice-cloud-bg {
            fill: rgba(255, 255, 255, 0.04);
        }

        .cloud-word {
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
            font-weight: 800;
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .cloud-word.is-core {
            fill: #f6c95c;
        }

        .cloud-word.is-warn {
            fill: #e85b80;
        }

        .cloud-word.is-accent {
            fill: #13c7a7;
        }

        .cloud-word.is-muted {
            fill: #1584ad;
        }

        .cloud-word.is-deep {
            fill: #0b5f74;
        }

        .cloud-word.is-soft {
            fill: #f0bd4d;
        }

        @media (max-width: 760px) {
            .voice-feature-section {
                padding: 22px 18px;
            }

            .voice-chart-panel {
                min-width: 900px;
            }

            .voice-insight-grid {
                grid-template-columns: 1fr;
            }

            .voice-stage-grid {
                grid-template-columns: 1fr;
            }

        }

    </style>
