<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-A轴分析 - 全周期信息</title>
    <style>
        :root {
            --bg-color: #050a18;
            --panel-bg: rgba(20, 26, 35, 0.8);
            --accent-color: #00e5ff;
            --text-primary: #ffffff;
            --text-secondary: #a0c4ff;
            --border-color: rgba(0, 191, 255, 0.2);
            --danger-text: #ff4d4d;
            --highlight-bg: #ffe0d6; /* DLPFC 推荐色 */
            --default-tag-bg: #cfd8dc; /* 默认标签色 */
        }

        body {
            margin: 0;
            padding: 30px;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 顶部导航与描述 */
        .header-section {
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .header-section h1 {
            font-size: 18px;
            color: var(--text-secondary);
            font-weight: normal;
            margin: 0 0 15px 0;
        }

        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .description {
            font-size: 14px;
            line-height: 1.6;
            max-width: 70%;
            color: var(--text-primary);
        }

        .enigma-tag {
            color: var(--danger-text);
            font-size: 18px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 500;
        }

        /* 图像网格 */
        .plot-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-top: 50px;
        }

        .plot-item {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 30px;
        }

        /* 模拟 S-A 轴梯度图容器 */
        .plot-box {
            width: 100%;
            aspect-ratio: 1.5;
            background: #000;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 模拟梯度散点图背景 */
            background-image: 
                radial-gradient(circle at 30% 70%, rgba(0, 229, 255, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 70% 30%, rgba(112, 0, 255, 0.3) 0%, transparent 50%);
        }

        .plot-box::after {
            content: "";
            position: absolute;
            width: 80%;
            height: 1px;
            background: rgba(255,255,255,0.1);
            transform: rotate(-35deg);
        }

        .date-label {
            margin-top: 20px;
            font-size: 15px;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.05);
            padding: 5px 25px;
            border-radius: 4px;
        }

        /* 底部推荐区域 */
        .target-recommendation {
            margin-top: 80px;
            display: flex;
            align-items: center;
            gap: 30px;
            padding: 20px;
        }

        .target-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--accent-color);
        }

        .tag-group {
            display: flex;
            gap: 20px;
        }

        .target-tag {
            padding: 8px 25px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            color: #333;
            min-width: 80px;
            text-align: center;
        }

        /* 对应 PPT 中的颜色 */
        .tag-dlpfc { background-color: var(--highlight-bg); color: #85422d; }
        .tag-mpfc { background-color: var(--default-tag-bg); color: #455a64; }
        .tag-oc { background-color: var(--default-tag-bg); color: #455a64; }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--accent-color);
            text-decoration: none;
            font-size: 14px;
        }

        /* 图片点击放大 */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            cursor: zoom-out;
        }
        .modal img {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
    <link rel="stylesheet" href="style.css">
    <style>
        body.sa-page {
            padding: 18px 15px 36px;
            background:
                linear-gradient(135deg, rgba(45, 212, 191, 0.08), transparent 30%),
                linear-gradient(225deg, rgba(129, 140, 248, 0.12), transparent 34%),
                #07111f;
        }

        .sa-page .module-header,
        .sa-page .sa-view-section,
        .sa-page .target-recommendation {
            width: min(1264px, 100%);
            margin-left: auto;
            margin-right: auto;
        }

        .sa-page .module-topbar {
            margin-bottom: 18px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--border-color);

        .sa-page .module-title {
            color: var(--text-primary) !important;
            font-size: 18px !important;

        .sa-page .module-back {

        .sa-page .module-back:hover {

        .sa-page .module-back img {

        .sa-page .subject-info-card,

            background: rgba(11, 24, 39, 0.58);
            border: 1px solid var(--border-color);
            border-radius: 7px;

            backdrop-filter: blur(16px);
        }

        .sa-page .subject-info-card {
            padding: 18px 26px 16px;
        }

        .sa-page .subject-info-title,
        .sa-page .section-heading,
        .sa-page .target-title {
            color: var(--text-primary);
            font-size: 18px;
            font-weight: 700;
        }

        .sa-page .subject-info-grid {
            color: var(--text-secondary);
            max-width: 880px;
        }

        .sa-page .subject-info-grid strong {
            color: var(--text-primary);
        }

        .sa-page .sa-view-section {
            margin-top: 26px;
            padding: 26px 26px 30px;
        }

        .sa-page .section-heading {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 0 28px;
        }

        .sa-page .section-heading::before,
        .sa-page .target-title::before {
            content: "";
            width: 20px;
            height: 20px;
            border: 1.5px solid var(--text-secondary);
        }

        .sa-page .section-heading::before {
            border-radius: 50%;
            background:
                radial-gradient(circle at 35% 35%, var(--text-secondary) 0 2px, transparent 2px),
                radial-gradient(circle at 65% 35%, var(--text-secondary) 0 2px, transparent 2px),
                radial-gradient(circle at 50% 65%, var(--text-secondary) 0 2px, transparent 2px);
        }

        .sa-page .plot-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 18px;
            margin: 0;
        }

        .sa-page .plot-item {
            display: grid;
            grid-template-columns: minmax(120px, 180px) minmax(0, 1fr);
            align-items: center;
            gap: 32px;
            min-width: 0;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.025);
            border: 1px solid rgba(148, 194, 230, 0.14);
            border-radius: 8px;
            transition: border-color 0.18s ease, background 0.18s ease;
        }

        .sa-page .plot-item:hover {
            background: rgba(45, 212, 191, 0.045);
            border-color: rgba(45, 212, 191, 0.3);
        }

        .sa-page .plot-image {
            width: clamp(360px, 42vw, 520px);
            height: 240px;
            justify-self: center;
            object-fit: contain;
            display: block;
            border-radius: 6px;
        }

        .sa-page .date-label {
            margin: 0;
            margin-left: 42px;
            padding: 8px 14px;
            background: rgba(56, 189, 248, 0.08);
            border: 1px solid rgba(56, 189, 248, 0.24);
            border-radius: 999px;
            color: var(--accent-strong);
            font-size: 22px;
            font-weight: 700;
            line-height: 1;
            width: fit-content;
        }

        .sa-page .target-recommendation {
            margin-top: 24px;
            padding: 22px 26px;
            flex-wrap: wrap;
        }

        .sa-page .target-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
        }

        .sa-page .target-title::before {
            border-radius: 4px;
            background:
                linear-gradient(var(--text-secondary), var(--text-secondary)) 5px 5px / 9px 1px no-repeat,
                linear-gradient(var(--text-secondary), var(--text-secondary)) 5px 10px / 11px 1px no-repeat,
                linear-gradient(var(--text-secondary), var(--text-secondary)) 5px 15px / 8px 1px no-repeat;
        }

        .sa-page .tag-group {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .sa-page .target-tag {
            min-width: 76px;
            min-height: 30px;
            padding: 6px 18px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(148, 194, 230, 0.38);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            box-shadow: none;
        }

        .sa-page .tag-dlpfc {
            color: var(--accent-color);
            border-color: rgba(45, 212, 191, 0.76);
            background: rgba(45, 212, 191, 0.1);
        }

        @media (max-width: 980px) {
            .sa-page .plot-item {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .sa-page .plot-image {
                width: min(100%, 440px);
                height: 255px;
                margin: 0 auto;
                justify-self: center;
            }
        }

        @media (max-width: 620px) {
            body.sa-page {
                padding: 16px 12px 28px;
            }

            .sa-page .sa-view-section,
            .sa-page .target-recommendation {
                padding: 20px 16px;
            }

            .sa-page .plot-item {
                padding: 16px;
            }

            .sa-page .plot-image {
                height: 220px;
            }
        }
    </style>
</head>
<body class="sa-page">

    <div class="header-section module-header">
        <div class="module-topbar">
            <h1 class="module-title">S-A轴分析 - 全周期信息</h1>
            <nav class="return-nav">
                <a href="个体数字画像.html" class="back-link back-icon module-back" aria-label="返回上一级" title="返回上一级"><img src="123.svg" alt=""><span>返回</span></a>
            </nav>
        </div>
        <section class="subject-info-card" aria-label="被试者基本信息">
            <div class="subject-info-title">基本信息</div>
            <div class="subject-info-grid">
                <div>编号：<strong>NN_00000001</strong></div>
                <div>诊断：<strong>4.1双相情感障碍 I型</strong></div>
                <div>组别：<strong>普通组</strong></div>
                <div>性别：<strong>男</strong></div>
                <div>年龄：<strong>12</strong></div>
            </div>
        </section>
    </div>

    <section class="sa-view-section">
        <h2 class="section-heading">S-A轴视图</h2>
        <div class="plot-grid">
            <div class="plot-item">
                <div class="date-label">S001</div>
                <img src="image/s1.png" alt="S-A轴视图 S001" class="plot-image">
            </div>

            <div class="plot-item">
                <div class="date-label">S002</div>
                <img src="image/s2.png" alt="S-A轴视图 S002" class="plot-image">
            </div>

            <div class="plot-item">
                <div class="date-label">S003</div>
                <img src="image/s3.png" alt="S-A轴视图 S003" class="plot-image">
            </div>
        </div>
    </section>

    <footer class="target-recommendation">
        <div class="target-title">干预靶点推荐</div>
        <div class="tag-group">
            <div class="target-tag tag-dlpfc">DLPFC</div>
            <div class="target-tag tag-mpfc">mPFC</div>
            <div class="target-tag tag-oc">OC</div>
        </div>
        <div style="margin-left: auto; font-size: 12px; color: var(--text-secondary); opacity: 0.6;">
            <!-- *基于皮层梯度偏移量自动演算结论 -->
        </div>
    </footer>

    <!-- 图片放大模态框 -->
    <div id="imgModal" class="modal">
        <img id="modalImg" src="">
    </div>

    <script>
        const modal = document.getElementById('imgModal');
        const modalImg = document.getElementById('modalImg');
        const plotImages = document.querySelectorAll('.plot-image');

        plotImages.forEach(img => {
            img.style.cursor = 'zoom-in';
            img.addEventListener('click', () => {
                modalImg.src = img.src;
                modal.style.display = 'block';
            });
        });

        modal.addEventListener('click', () => {
            modal.style.display = 'none';
        });
    </script>

</body>
</html>
