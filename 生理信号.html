<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生理信号</title>
    <style>
        :root {
            --bg-color: #050a18;
            --panel-bg: rgba(20, 26, 35, 0.6);
            --accent-color: #00e5ff;
            --secondary-color: #7000ff;
            --text-primary: #ffffff;
            --text-secondary: #a0c4ff;
            --border-color: rgba(0, 191, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 30px;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: "Microsoft YaHei", sans-serif;
            overflow-x: hidden;
        }

        /* 顶部导航与标题 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .title-area h1 {
            font-size: 28px;
            margin: 0;
            letter-spacing: 1px;
            background: linear-gradient(to right, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border: 1px solid var(--accent-color);
            border-radius: 4px;
            transition: 0.3s;
        }

        .back-btn:hover { background: rgba(0, 229, 255, 0.1); }

        /* 图表容器 */
        .chart-section {
            margin-bottom: 50px;
        }

        .chart-title {
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-title span { color: var(--text-secondary); }
        .chart-title .red-text { color: #ff4d4d; font-size: 14px; border: 1px solid #ff4d4d; padding: 2px 8px; border-radius: 4px; }

        .chart-box {
            width: 100%;
            height: 240px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            position: relative;
            padding: 20px 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .chart-group {
            width: min(1440px, 100%);
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 50px;
            padding: 24px 26px 30px;
            background: rgba(11, 24, 39, 0.58);
            border: 1px solid var(--border-color);
            border-radius: 7px;
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(16px);
            box-sizing: border-box;
        }

        .chart-group .chart-section:last-child {
            margin-bottom: 0;
        }

        .chart-group-title {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 0 24px;
            color: var(--text-primary);
            font-size: 18px;
            font-weight: 700;
        }

        .chart-group-title::before {
            content: "";
            width: 20px;
            height: 20px;
            border: 1.5px solid var(--text-secondary);
            border-radius: 50%;
            background:
                radial-gradient(circle at 35% 35%, var(--text-secondary) 0 2px, transparent 2px),
                radial-gradient(circle at 65% 35%, var(--text-secondary) 0 2px, transparent 2px),
                radial-gradient(circle at 50% 65%, var(--text-secondary) 0 2px, transparent 2px);
        }

        /* 模拟折线图 SVG */
        .svg-chart {
            width: 100%;
            height: 100%;
        }

        .line-hr { stroke: var(--accent-color); stroke-width: 2; fill: none; filter: drop-shadow(0 0 5px var(--accent-color)); }
        .line-hrv { stroke: var(--secondary-color); stroke-width: 2; fill: none; filter: drop-shadow(0 0 5px var(--secondary-color)); }

        /* X轴坐标文字 */
        .x-axis-labels {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* 底部汇总指标 */
        .footer-metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .metric-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .metric-card .label { color: var(--text-secondary); }
        .metric-card .value { font-size: 24px; color: var(--accent-color); font-weight: bold; }

        .physio-chart-card {
            width: 100%;
            min-height: 280px;
            background: rgba(17, 31, 51, 0.78);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 18px 22px 20px;
            box-shadow: var(--shadow-soft);
            box-sizing: border-box;
        }

        .physio-chart-card + .physio-chart-card {
            margin-top: 22px;
        }

        .chart-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            margin-bottom: 16px;
        }

        .chart-tabs,
        .range-tabs {
            display: inline-flex;
            align-items: center;
            gap: 0;
        }

        .chart-tab {
            min-width: 58px;
            height: 30px;
            padding: 0 14px;
            border: 1px solid rgba(148, 194, 230, 0.26);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-secondary);
            font-size: 13px;
        }

        .chart-tab:first-child {
            border-radius: 6px 0 0 6px;
        }

        .chart-tab:last-child {
            border-radius: 0 6px 6px 0;
            border-left: 0;
        }

        .chart-tab.is-active {
            color: var(--accent-color);
            border-color: var(--accent-color);
            background: rgba(45, 212, 191, 0.1);
        }

        .chart-filters {
            display: flex;
            align-items: center;
            gap: 14px;
            color: var(--text-secondary);
            font-size: 12px;
        }

        .range-tabs span {
            padding: 0 7px;
        }

        .range-tabs .active-range {
            color: var(--accent-color);
        }

        .date-range {
            min-height: 30px;
            display: inline-flex;
            align-items: center;
            padding: 0 12px;
            border: 1px solid rgba(148, 194, 230, 0.28);
            border-radius: 6px;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.03);
        }

        .chart-canvas {
            width: 100%;
            height: 210px;
            display: block;
            box-sizing: border-box;
        }

        .chart-axis {
            stroke: rgba(148, 194, 230, 0.24);
            stroke-width: 1;
        }

        .grid-line {
            stroke: rgba(148, 194, 230, 0.1);
            stroke-width: 1;
        }

        .axis-label {
            fill: var(--text-secondary);
            font-size: 11px;
        }

        .area-fill {
            fill: rgba(45, 212, 191, 0.18);
        }

        .area-line {
            fill: none;
            stroke: var(--accent-color);
            stroke-width: 2.2;
            filter: drop-shadow(0 0 5px rgba(45, 212, 191, 0.55));
        }

        .hover-marker {
            stroke: rgba(148, 194, 230, 0.6);
            stroke-width: 1;
        }

        .hover-point {
            fill: var(--accent-strong);
            stroke: var(--text-primary);
            stroke-width: 2;
        }

        .chart-tooltip {
            fill: rgba(4, 10, 20, 0.88);
            stroke: rgba(148, 194, 230, 0.28);
        }

        .tooltip-text {
            fill: var(--text-primary);
            font-size: 12px;
        }

        .bar-fill {
            fill: rgba(45, 212, 191, 0.72);
        }

        @media (max-width: 760px) {
            .chart-toolbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .chart-filters {
                flex-wrap: wrap;
            }
        }

    </style>
