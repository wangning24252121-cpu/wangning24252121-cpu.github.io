<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐治疗 - 全周期信息</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .music-page .module-header,
        .music-section {
            width: min(var(--page-max-width), 100%);
            margin-left: auto;
            margin-right: auto;
        }

        .music-section {
            margin-top: 28px;
            padding: 26px 30px 30px;
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: var(--shadow-soft);
        }

        .music-section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 0 24px;
            color: var(--text-primary);
            font-size: 18px;
            font-weight: 700;
        }

        .music-section-title::before {
            content: "";
            width: 20px;
            height: 20px;
            border: 1.5px solid var(--text-secondary);
            border-radius: 50%;
            background:
                radial-gradient(circle at 35% 35%, var(--text-secondary) 0 2px, transparent 2px),
                radial-gradient(circle at 65% 35%, var(--text-secondary) 0 2px, transparent 2px),
                radial-gradient(circle at 50% 65%, var(--text-secondary) 0 2px, transparent 2px);
        }

        .music-section-heading {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 24px;
        }

        .music-section-heading .music-section-title {
            margin-bottom: 0;
        }

        .audio-analysis-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 104px;
            height: 36px;
            padding: 0 18px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--accent-color), var(--accent-strong));
            box-shadow: 0 10px 22px rgba(22, 127, 143, 0.18);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            white-space: nowrap;
        }

        .audio-analysis-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 28px rgba(22, 127, 143, 0.24);
        }

        .music-chart-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 22px;
        }

        .music-chart-panel {
            padding: 20px 20px 18px;
            background: #f8fcfc;
            border: 1px solid #e8f0f3;
            border-radius: 8px;
        }

        .music-chart-title {
            margin: 0 0 14px;
            color: var(--text-primary);
            font-size: 17px;
            font-weight: 700;
            text-align: center;
        }

        .symptom-chart {
            width: 100%;
            height: 280px;
            display: block;
        }

        .chart-axis {
            stroke: #1f2933;
            stroke-width: 1.8;
        }

        .zero-line {
            stroke: #1f2933;
            stroke-width: 1.4;
            stroke-dasharray: 2 3;
        }

        .chart-label {
            fill: #1f2933;
            font-size: 13px;
            font-weight: 700;
        }

        .tick-label {
            fill: #1f2933;
            font-size: 12px;
        }

        .error-line {
            stroke: #8c8c8c;
            stroke-width: 1.5;
        }

        .change-line {
            stroke: #111827;
            stroke-width: 2;
            fill: none;
        }

        .point-control {
            fill: #35b7a7;
        }

        .point-treatment {
            fill: #8aa2c5;
        }

        .sig-line {
            stroke: #111827;
            stroke-width: 2;
            fill: none;
        }

        .sig-text {
            fill: #111827;
            font-size: 18px;
            font-weight: 800;
            text-anchor: middle;
        }

        .music-note {
            margin: 18px 0 0;
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.8;
        }

        .forest-section {
            margin-top: 24px;
            padding-top: 22px;
            border-top: 1px solid #e8f0f3;
        }

        .forest-panel {
            padding: 20px;
            background: #f8fcfc;
            border: 1px solid #e8f0f3;
            border-radius: 8px;
        }

        .forest-chart {
            width: 100%;
            height: 300px;
            display: block;
        }

        .forest-text {
            fill: #111827;
            font-size: 18px;
            font-weight: 700;
        }

        .forest-small {
            fill: #111827;
            font-size: 15px;
        }

        .forest-line {
            stroke: #111827;
            stroke-width: 2;
        }

        .forest-ci {
            stroke: #111827;
            stroke-width: 2;
        }

        .forest-dot {
            fill: #111827;
        }

        body.music-page {
            padding: 18px 15px 36px;
            background:
                linear-gradient(135deg, rgba(45, 212, 191, 0.08), transparent 30%),
                linear-gradient(225deg, rgba(129, 140, 248, 0.12), transparent 34%),
                #07111f;
            color: var(--text-primary);
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        }

        .music-page .module-header,
        .music-page .music-section {
            width: min(1264px, 100%);
            margin-left: auto;
            margin-right: auto;
        }

        .music-page .module-topbar {
            margin-bottom: 18px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--border-color);
        }

        .music-page .module-title {
            color: var(--text-primary) !important;
            font-size: 18px !important;
        }

        .music-page .module-back {
            color: var(--text-secondary);
        }

        .music-page .module-back:hover {
            color: var(--accent-color);
        }

        .music-page .module-back img {
            filter: none;
            opacity: 0.72;
        }

        .music-page .subject-info-card,
        .music-page .music-section {
            background: rgba(11, 24, 39, 0.58);
            border: 1px solid var(--border-color);
            border-radius: 7px;
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(16px);
        }

        .music-page .subject-info-card {
            padding: 18px 26px 16px;
        }

        .music-page .subject-info-title,
        .music-page .music-section-title,
        .music-page .music-chart-title {
            color: var(--text-primary);
        }

        .music-page .subject-info-grid,
        .music-page .music-note {
            color: var(--text-secondary);
        }

        .music-page .subject-info-grid strong {
            color: var(--text-primary);
        }

        .music-page .therapy-category {
            grid-column: 1 / -1;
        }

        .therapy-category-value {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            margin-left: 4px;
            padding: 3px 12px;
            border: 1px solid rgba(45, 212, 191, 0.55);
            border-radius: 999px;
            background: rgba(45, 212, 191, 0.12);
            color: var(--accent-color);
            font-weight: 700;
        }

        .therapy-category-card {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid rgba(148, 194, 230, 0.16);
        }

        .therapy-category-title {
            margin: 0 0 10px;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 700;
        }

        .therapy-category-list {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 10px;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .therapy-category-list li {
            padding: 0;
            border: none;
            border-radius: 0;
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.4;
        }

        .therapy-category-list strong {
            display: block;
            margin-bottom: 4px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .therapy-category-list li.is-current {
            color: var(--text-secondary);
        }

        .music-page .music-section {
            margin-top: 26px;
            padding: 26px;
        }

        .music-page .music-chart-panel,
        .music-page .forest-panel {
            background: rgba(17, 31, 51, 0.78);
            border: 1px solid rgba(148, 194, 230, 0.2);
            box-shadow: none;
        }

        .music-page .forest-section {
            border-top-color: rgba(148, 194, 230, 0.18);
        }

        .music-page .chart-axis,
        .music-page .zero-line,
        .music-page .change-line,
        .music-page .sig-line,
        .music-page .forest-line,
        .music-page .forest-ci {
            stroke: var(--text-primary);
        }

        .music-page .error-line {
            stroke: var(--text-secondary);
        }

        .music-page .chart-label,
        .music-page .tick-label,
        .music-page .sig-text,
        .music-page .forest-text,
        .music-page .forest-small {
            fill: var(--text-primary);
        }

        .music-page .forest-dot {
            fill: var(--accent-color);
        }

        .music-page .point-control {
            fill: var(--accent-color);
        }

        .music-page .point-treatment {
            fill: var(--secondary-color);
        }

        @media (max-width: 980px) {
            .music-section-heading {
                align-items: flex-start;
                flex-direction: column;
            }

            .music-chart-grid {
                grid-template-columns: 1fr;
            }

            .therapy-category-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="music-page">
    <div class="header module-header">
        <div class="module-topbar">
            <h1 class="module-title">音乐治疗 - 全周期信息</h1>
            <nav class="return-nav">
                <a href="index.html" class="back-btn back-icon module-back" aria-label="返回上一级" title="返回上一级"><img src="123.svg" alt=""><span>返回</span></a>
            </nav>
        </div>
        <section class="subject-info-card" aria-label="被试者基本信息">
            <div class="subject-info-title">基本信息</div>
            <div class="subject-info-grid">
                <div>编号：<strong>NN_00000017</strong></div>
                <div>诊断：<strong>1健康者</strong></div>
                <div>组别：<strong>常规rTMS组</strong></div>
                <div>性别：<strong>男</strong></div>
                <div>年龄：<strong>30</strong></div>
                <div class="therapy-category">音乐治疗类别：<span class="therapy-category-value">音乐调节</span></div>
            </div>
            <div class="therapy-category-card" aria-label="音乐治疗类别说明">
                <div class="therapy-category-title">类别说明</div>
                <ul class="therapy-category-list">
                    <li class="is-current">通过个体偏好的旋律、节奏和情绪色彩进行干预，帮助被试者稳定情绪、降低紧张感，并建立更积极的情绪唤醒状态。</li>
                </ul>
            </div>
        </section>
    </div>

    <section class="music-section">
        <div class="music-section-heading">
            <h2 class="music-section-title">音乐治疗症状变化评估</h2>
            <a class="audio-analysis-btn" href="https://example.com/audio-analysis" target="_blank" rel="noopener noreferrer">音频分析</a>
        </div>
        <div class="music-chart-grid">
            <article class="music-chart-panel">
                <h3 class="music-chart-title">抑郁症状变化</h3>
                <svg class="symptom-chart" viewBox="0 0 340 280" role="img" aria-label="抑郁症状变化折线图">
                    <line class="chart-axis" x1="52" y1="22" x2="52" y2="238" />
                    <line class="chart-axis" x1="52" y1="238" x2="314" y2="238" />
                    <line class="zero-line" x1="52" y1="180" x2="314" y2="180" />
                    <text class="chart-label" transform="translate(18 190) rotate(-90)">The changes of depression</text>
                    <text class="tick-label" x="28" y="27">1.5</text>
                    <text class="tick-label" x="29" y="85">1.0</text>
                    <text class="tick-label" x="29" y="143">0.5</text>
                    <text class="tick-label" x="34" y="184">0</text>
                    <text class="tick-label" x="28" y="242">-0.5</text>
                    <line class="error-line" x1="128" y1="72" x2="128" y2="180" />
                    <line class="error-line" x1="254" y1="158" x2="254" y2="205" />
                    <path class="change-line" d="M128 102 L254 184" />
                    <path class="sig-line" d="M128 52 L128 38 L254 38 L254 158" />
                    <text class="sig-text" x="191" y="34">*</text>
                    <rect class="point-control" x="122" y="96" width="12" height="12" transform="rotate(45 128 102)" />
                    <rect class="point-treatment" x="248" y="178" width="12" height="12" transform="rotate(45 254 184)" />
                    <text class="chart-label" x="75" y="264">COVID- Group</text>
                    <text class="chart-label" x="205" y="264">COVID+ Group</text>
                </svg>
            </article>

            <article class="music-chart-panel">
                <h3 class="music-chart-title">焦虑症状变化</h3>
                <svg class="symptom-chart" viewBox="0 0 340 280" role="img" aria-label="焦虑症状变化折线图">
                    <line class="chart-axis" x1="52" y1="22" x2="52" y2="238" />
                    <line class="chart-axis" x1="52" y1="238" x2="314" y2="238" />
                    <line class="zero-line" x1="52" y1="142" x2="314" y2="142" />
                    <text class="chart-label" transform="translate(18 186) rotate(-90)">The changes of anxiety</text>
                    <text class="tick-label" x="30" y="27">0.8</text>
                    <text class="tick-label" x="30" y="81">0.4</text>
                    <text class="tick-label" x="34" y="146">0</text>
                    <text class="tick-label" x="25" y="210">-0.4</text>
                    <line class="error-line" x1="128" y1="66" x2="128" y2="182" />
                    <line class="error-line" x1="254" y1="120" x2="254" y2="172" />
                    <path class="change-line" d="M128 102 L254 156" />
                    <rect class="point-control" x="122" y="96" width="12" height="12" transform="rotate(45 128 102)" />
                    <rect class="point-treatment" x="248" y="150" width="12" height="12" transform="rotate(45 254 156)" />
                    <text class="chart-label" x="75" y="264">COVID- Group</text>
                    <text class="chart-label" x="205" y="264">COVID+ Group</text>
                </svg>
            </article>

            <article class="music-chart-panel">
                <h3 class="music-chart-title">失眠症状变化</h3>
                <svg class="symptom-chart" viewBox="0 0 340 280" role="img" aria-label="失眠症状变化折线图">
                    <line class="chart-axis" x1="52" y1="22" x2="52" y2="238" />
                    <line class="chart-axis" x1="52" y1="238" x2="314" y2="238" />
                    <line class="zero-line" x1="52" y1="180" x2="314" y2="180" />
                    <text class="chart-label" transform="translate(18 182) rotate(-90)">The changes of insomnia</text>
                    <text class="tick-label" x="28" y="27">1.5</text>
                    <text class="tick-label" x="29" y="85">1.0</text>
                    <text class="tick-label" x="29" y="143">0.5</text>
                    <text class="tick-label" x="34" y="184">0</text>
                    <text class="tick-label" x="28" y="242">-0.5</text>
                    <line class="error-line" x1="128" y1="58" x2="128" y2="158" />
                    <line class="error-line" x1="254" y1="168" x2="254" y2="212" />
                    <path class="change-line" d="M128 88 L254 194" />
                    <path class="sig-line" d="M128 46 L128 34 L254 34 L254 160" />
                    <text class="sig-text" x="191" y="30">**</text>
                    <rect class="point-control" x="122" y="82" width="12" height="12" transform="rotate(45 128 88)" />
                    <rect class="point-treatment" x="248" y="188" width="12" height="12" transform="rotate(45 254 194)" />
                    <text class="chart-label" x="75" y="264">COVID- Group</text>
                    <text class="chart-label" x="205" y="264">COVID+ Group</text>
                </svg>
            </article>
        </div>

        <p class="music-note"><strong>Fig. 2.</strong> 音乐治疗前后症状变化趋势示意。* 表示 p &lt; .05，** 表示 p &lt; .01。</p>

        <div class="forest-section">
            <h2 class="music-section-title">心理症状发生风险比</h2>
            <div class="forest-panel">
                <svg class="forest-chart" viewBox="0 0 1120 300" preserveAspectRatio="none" role="img" aria-label="心理症状发生风险比森林图">
                    <line class="forest-line" x1="80" y1="38" x2="1040" y2="38" />
                    <text class="forest-text" x="86" y="30">ONS of Psychological Symptoms</text>
                    <text class="forest-text" x="818" y="30">OR</text>
                    <text class="forest-text" x="895" y="30">95% CI</text>
                    <text class="forest-text" x="1005" y="30">P value</text>
                    <line class="forest-line" x1="500" y1="40" x2="500" y2="238" />
                    <line class="forest-line" x1="380" y1="248" x2="780" y2="248" />
                    <line class="forest-ci" x1="480" y1="88" x2="565" y2="88" />
                    <line class="forest-ci" x1="462" y1="138" x2="535" y2="138" />
                    <line class="forest-ci" x1="506" y1="188" x2="704" y2="188" />
                    <circle class="forest-dot" cx="515" cy="88" r="6" />
                    <circle class="forest-dot" cx="494" cy="138" r="6" />
                    <circle class="forest-dot" cx="604" cy="188" r="6" />
                    <text class="forest-text" x="86" y="95">Depression</text>
                    <text class="forest-text" x="86" y="145">Anxiety</text>
                    <text class="forest-text" x="86" y="195">Insomnia</text>
                    <text class="forest-small" x="380" y="275">0</text>
                    <text class="forest-small" x="495" y="275">1</text>
                    <text class="forest-small" x="610" y="275">2</text>
                    <text class="forest-small" x="725" y="275">3</text>
                    <text class="forest-small" x="775" y="275">4</text>
                    <text class="forest-small" x="818" y="95">1.15</text>
                    <text class="forest-small" x="895" y="95">0.79-1.67</text>
                    <text class="forest-small" x="1010" y="95">0.227</text>
                    <text class="forest-small" x="818" y="145">0.93</text>
                    <text class="forest-small" x="895" y="145">0.82-1.19</text>
                    <text class="forest-small" x="1010" y="145">0.459</text>
                    <text class="forest-small" x="818" y="195">1.83</text>
                    <text class="forest-small" x="895" y="195">1.05-3.21</text>
                    <text class="forest-small" x="1010" y="195">0.034</text>
                </svg>
            </div>
            <p class="music-note"><strong>Fig. 3.</strong> 音乐治疗相关心理症状发生风险比示意。</p>
        </div>
    </section>
</body>
</html>
